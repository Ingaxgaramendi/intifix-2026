services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intifix
      POSTGRES_USER: intifix
      POSTGRES_PASSWORD: intifix
    ports:
      - "5432:5432"
    volumes:
      - intifix_pg:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - intifix_mongo:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  intifix_pg:
  intifix_mongo:
