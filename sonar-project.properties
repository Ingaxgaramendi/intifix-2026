# ============================================================
# SonarCloud — Backend Spring Boot (intifix-2026)
# ============================================================
# Reemplaza los valores de YOUR_ORG y YOUR_PROJECT_KEY con
# los que te asignó SonarCloud al crear el proyecto.
# ============================================================

sonar.projectKey=YOUR_ORG_intifix-backend
sonar.organization=YOUR_ORG
sonar.projectName=IntiFix Backend
sonar.projectVersion=1.0

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Reporte de cobertura generado por JaCoCo (mvn verify lo produce)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Excluir clases autogeneradas y configuración del análisis
sonar.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/*Application.java,\
  **/*MapperImpl.java,\
  **/config/**

sonar.test.exclusions=**/IntifixApplicationTests.java

sonar.sourceEncoding=UTF-8
sonar.java.source=21
